name: Build opencode-router image

on:
  push:
    branches:
      - dev
      - main
      - homelab-deployment
    paths:
      - packages/opencode-router/**
      - .github/workflows/build-opencode-router.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencode-router
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./packages/opencode-router/package.json').version")
          SHA_SHORT=${GITHUB_SHA::7}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION}-${GITHUB_REF_NAME}.${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/opencode-router/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image tag
        run: echo "Built and pushed ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"

      - name: Update Pulumi stack config with new image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase origin main
            yq e '.config["code:routerImage"] = "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"' \
              -i deployment/homelab/Pulumi.dev.yaml
            git add deployment/homelab/Pulumi.dev.yaml
            git diff --cached --quiet && break
            git commit -m "chore(deploy): update routerImage to ${{ steps.version.outputs.tag }}"
            git push && break || git reset HEAD~1
          done
