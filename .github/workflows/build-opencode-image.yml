name: Build opencode image

# Builds the fork-customised opencode image that bakes in default config, tools,
# and MCP servers on top of the upstream ghcr.io/anomalyco/opencode base.
#
# Base image tag:
#   Pinned in deployment/homelab/images/opencode/.base-version (format: 0.0.0-dev-YYYYMMDDHHMI).
#   Updated automatically by the upstream-merge workflow when upstream is merged.
#   Upstream publishes images as 0.0.0-dev-YYYYMMDDHHMI — not semver.
#
# Note: uses plain `docker build` + `docker push` (not buildx) to avoid
# GHCR cross-owner blob mount 403 errors that occur with buildx on new packages.

on:
  push:
    branches:
      - main
    paths:
      - deployment/homelab/images/opencode/**
      - deployment/homelab/script/**
      - .github/workflows/build-opencode-image.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencode
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          # GH_PAT must have scopes: repo, workflow, write:packages
          echo "${{ secrets.GH_PAT }}" | docker login ghcr.io \
            -u ${{ github.repository_owner }} --password-stdin

      - name: Read versions
        id: version
        run: |
          VERSION=$(node -p "require('./packages/opencode/package.json').version")
          SHA_SHORT=${GITHUB_SHA::7}
          BASE_TAG=$(cat deployment/homelab/images/opencode/.base-version | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION}-${GITHUB_REF_NAME}.${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "base=${BASE_TAG}" >> $GITHUB_OUTPUT
          echo "Building fork image ${VERSION}-${GITHUB_REF_NAME}.${SHA_SHORT} on top of upstream ${BASE_TAG}"

      - name: Build
        run: |
          docker build \
            --build-arg BASE_VERSION=${{ steps.version.outputs.base }} \
            --file deployment/homelab/images/opencode/Dockerfile \
            --pull \
            -t ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }} \
            -t ${{ env.IMAGE_NAME }}:latest \
            deployment/homelab

      - name: Push
        run: |
          docker push ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
          docker push ${{ env.IMAGE_NAME }}:latest

      - name: Setup Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Wait for Tailscale
        run: sleep 10

      - name: Setup kubectl
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info --request-timeout=10s
          kubectl get svc -A
          kubectl get svc -n code -o wide || true

      - name: Pre-pull image on router (reduce cold start times)
        env:
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          # Skip if secret not configured
          if [ -z "$ADMIN_SECRET" ]; then
            echo "Skipping pre-pull: ADMIN_SECRET not configured"
            exit 0
          fi

          IMAGE="${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"
          echo "Pre-pulling image: $IMAGE"

          # Use kubectl port-forward to bypass oauth2-proxy and reach router service directly
          kubectl port-forward -n code svc/code-service 3000:3000 &
          PF_PID=$!
          sleep 5

          # Call the admin endpoint via localhost (port-forwarded)
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "http://localhost:3000/api/admin/pull-image" \
            -H "Content-Type: application/json" \
            -H "X-Admin-Secret: $ADMIN_SECRET" \
            -d "{\"image\":\"$IMAGE\",\"updateConfig\":true}")

          # Cleanup port-forward
          kill $PF_PID 2>/dev/null || true

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "Response ($HTTP_CODE): $BODY"

          if [ "$HTTP_CODE" -eq 200 ]; then
            echo "✅ Image pre-pulled successfully"
          else
            echo "⚠️ Warning: Failed to pre-pull image (HTTP $HTTP_CODE)"
            echo "The image was built and pushed successfully, but pre-pull failed."
            echo "New sessions may have slower cold starts until the image is cached."
            # Don't fail the workflow - image is still available
            exit 0
          fi

      - name: Update Pulumi stack config with new image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase origin main
            yq e '.config["code:opencodeImage"] = "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"' \
              -i deployment/homelab/Pulumi.dev.yaml
            git add deployment/homelab/Pulumi.dev.yaml
            git diff --cached --quiet && break
            git commit -m "chore(deploy): update opencodeImage to ${{ steps.version.outputs.tag }}"
            git push && break || git reset HEAD~1
          done
