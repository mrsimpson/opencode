name: Build opencode image

# Builds the fork-customised opencode image that bakes in default config, tools,
# and MCP servers on top of the upstream ghcr.io/anomalyco/opencode base.
#
# Base image tag:
#   Pinned in deployment/homelab/images/opencode/.base-version (format: 0.0.0-dev-YYYYMMDDHHMI).
#   Updated automatically by the upstream-merge workflow when upstream is merged.
#   Upstream publishes images as 0.0.0-dev-YYYYMMDDHHMI — not semver.

on:
  push:
    branches:
      - main
    paths:
      - deployment/homelab/images/opencode/**
      - .github/workflows/build-opencode-image.yml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/opencode
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          # GH_PAT needed to push to a new GHCR package (GITHUB_TOKEN cannot create packages)
          password: ${{ secrets.GH_PAT }}

      - name: Read versions
        id: version
        run: |
          VERSION=$(node -p "require('./packages/opencode/package.json').version")
          SHA_SHORT=${GITHUB_SHA::7}
          BASE_TAG=$(cat deployment/homelab/images/opencode/.base-version | tr -d '[:space:]')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION}-${GITHUB_REF_NAME}.${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "base=${BASE_TAG}" >> $GITHUB_OUTPUT
          echo "Building fork image ${VERSION}-${GITHUB_REF_NAME}.${SHA_SHORT} on top of upstream ${BASE_TAG}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: deployment/homelab/images/opencode
          platforms: linux/amd64
          push: true
          provenance: false
          build-args: |
            BASE_VERSION=${{ steps.version.outputs.base }}
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update Pulumi stack config with new image tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for i in 1 2 3; do
            git pull --rebase origin main
            yq e '.config["code:opencodeImage"] = "${{ env.IMAGE_NAME }}:${{ steps.version.outputs.tag }}"' \
              -i deployment/homelab/Pulumi.dev.yaml
            git add deployment/homelab/Pulumi.dev.yaml
            git diff --cached --quiet && break
            git commit -m "chore(deploy): update opencodeImage to ${{ steps.version.outputs.tag }} [skip ci]"
            git push && break || git reset HEAD~1
          done
