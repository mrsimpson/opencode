name: Merge upstream into fork

# Manually triggered workflow that fetches the latest upstream commits and
# opens a pull-request against the fork's default branch (main).
#
# Usage:
#   gh workflow run upstream-merge.yml \
#     [-f upstream_ref=dev] \
#     [-f target_branch=main]
#
# What it does:
#   1. Fetch upstream (https://github.com/anomalyco/opencode)
#   2. Create a branch  upstream-merge/<upstream_ref>-<date>
#   3. Merge upstream/<upstream_ref> with --no-ff  (keeps history clean)
#      If conflicts exist the merge is left in a conflicted state and the
#      branch is pushed — the PR description will flag this so the reviewer
#      knows conflicts need manual resolution before merging.
#   4. Push the branch and open a PR with a summary of new upstream commits
#      and a reminder to re-run the disable-upstream-workflows.sh script.
#
# Required permissions:  contents: write  +  pull-requests: write
# Required secret:       GH_PAT — classic PAT with repo + workflow scopes
#                        (GITHUB_TOKEN cannot push branches containing workflow file changes)

on:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Upstream branch / tag / SHA to merge"
        default: dev
        required: true
        type: string
      target_branch:
        description: "Fork branch to merge into"
        default: main
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge ${{ inputs.upstream_ref }} → ${{ inputs.target_branch }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_branch }}
          fetch-depth: 0
          # PAT needed so the push can include upstream workflow file changes
          token: ${{ secrets.GH_PAT }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/anomalyco/opencode.git
          git fetch upstream ${{ inputs.upstream_ref }}

      - name: Resolve merge-base and collect new commits
        id: info
        run: |
          BASE=$(git merge-base HEAD upstream/${{ inputs.upstream_ref }})
          echo "base=$BASE" >> $GITHUB_OUTPUT
          COUNT=$(git rev-list --count "$BASE"..upstream/${{ inputs.upstream_ref }})
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          UPSTREAM_SHA=$(git rev-parse --short upstream/${{ inputs.upstream_ref }})
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          DATE=$(date +%Y%m%d)
          echo "date=$DATE" >> $GITHUB_OUTPUT
          BRANCH="upstream-merge/${{ inputs.upstream_ref }}-${DATE}"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          if [ "$COUNT" -eq 0 ]; then
            echo "up_to_date=true" >> $GITHUB_OUTPUT
          else
            echo "up_to_date=false" >> $GITHUB_OUTPUT
          fi

      - name: Exit early if already up-to-date
        if: steps.info.outputs.up_to_date == 'true'
        run: |
          echo "Fork is already up-to-date with upstream/${{ inputs.upstream_ref }}. Nothing to do."

      - name: Create merge branch from target
        if: steps.info.outputs.up_to_date == 'false'
        run: git checkout -b ${{ steps.info.outputs.branch }}

      - name: Attempt merge
        id: merge
        if: steps.info.outputs.up_to_date == 'false'
        run: |
          set +e
          git merge --no-ff upstream/${{ inputs.upstream_ref }} \
            -m "chore: merge upstream/${{ inputs.upstream_ref }} @ ${{ steps.info.outputs.upstream_sha }}"
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then
            echo "has_conflicts=true" >> $GITHUB_OUTPUT
            # Stage conflicted state so we can push the branch
            git add -A
            git commit --no-edit -m "chore: merge upstream (CONFLICTS — resolve before merging PR)"
          else
            echo "has_conflicts=false" >> $GITHUB_OUTPUT
          fi

      - name: Push merge branch
        if: steps.info.outputs.up_to_date == 'false'
        run: git push origin ${{ steps.info.outputs.branch }}

      - name: Collect upstream commit log
        id: log
        if: steps.info.outputs.up_to_date == 'false'
        run: |
          LOG=$(git log --oneline "${{ steps.info.outputs.base }}"..upstream/${{ inputs.upstream_ref }} | head -50)
          # Escape for multiline GitHub output
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "log<<$EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Create pull request
        if: steps.info.outputs.up_to_date == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GH_PAT }}
          script: |
            const hasConflicts = '${{ steps.merge.outputs.has_conflicts }}' === 'true'
            const count = '${{ steps.info.outputs.count }}'
            const upstreamSha = '${{ steps.info.outputs.upstream_sha }}'
            const log = `${{ steps.log.outputs.log }}`

            const conflictWarning = hasConflicts ? [
              '## ⚠️ Merge conflicts detected',
              '',
              'This branch was pushed with unresolved merge conflicts (committed with conflict markers).',
              'You **must resolve the conflicts** before merging this PR.',
              '',
            ] : []

            const body = [
              ...conflictWarning,
              '## Summary',
              '',
              `Merges **${count} commit(s)** from \`upstream/${{ inputs.upstream_ref }}\` @ \`${upstreamSha}\` into \`${{ inputs.target_branch }}\`.`,
              '',
              '## Upstream commits',
              '',
              '```',
              log,
              '```',
              '',
              '## Post-merge checklist',
              '',
              '- [ ] Resolve any merge conflicts',
              '- [ ] Re-run the disable-upstream-workflows script to catch any newly added upstream workflows:',
              '  ```sh',
              '  bash .github/fork/disable-upstream-workflows.sh',
              '  ```',
              '- [ ] Check `deployment/homelab/images/opencode/Dockerfile` — if the upstream `packages/opencode` version changed, update `BASE_VERSION` in the build-opencode-image workflow or bump `packages/opencode/package.json`',
              '- [ ] Run fork validation locally: `cd packages/opencode-router && pnpm test`',
            ].join('\n')

            const upstreamRef = '${{ inputs.upstream_ref }}'
            const title = hasConflicts
              ? `chore: merge upstream/${upstreamRef} @ ${upstreamSha} (CONFLICTS)`
              : `chore: merge upstream/${upstreamRef} @ ${upstreamSha} (${count} commits)`

            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              head: '${{ steps.info.outputs.branch }}',
              base: '${{ inputs.target_branch }}',
            })

            console.log(`PR created: ${pr.data.html_url}`)
            core.summary.addRaw(`## PR created\n\n${pr.data.html_url}`)
            await core.summary.write()
